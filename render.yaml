services:
  - type: web
    name: aviation-mro
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && PLAYWRIGHT_BROWSERS_PATH=0 python -m playwright install chromium
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aviation_db
          property: connectionString
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: ALLOW_RENDER_SHAREPOINT_BROWSER
        value: "1"

databases:
  - name: aviation_db
    plan: free
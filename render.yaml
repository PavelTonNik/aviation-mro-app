services:
  - type: web
    name: aviation-mro
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aviation_db
          property: connectionString
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: GH_SYNC_TOKEN
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: "PavelTonNik/aviation-mro-app"
      - key: GH_BRANCH
        value: "main"
      # Cloudflare R2 — Staff / Cars file uploads (set secrets in Render Dashboard)
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL
        sync: false

databases:
  - name: aviation_db
    plan: free
